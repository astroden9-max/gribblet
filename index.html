<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Holi! - Support Our Innovation</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,700&family=Plus+Jakarta+Sans:wght@200;300;400;700;800&family=Kalam:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-top: #1e40af; 
      --bg-bottom: #5b21b6;
      --glass-bg: rgba(255, 255, 255, 0.12);
      --glass-border: rgba(255, 255, 255, 0.2);
      --tricolor-saffron: #FF9933;
      --tricolor-white: #FFFFFF;
      --tricolor-green: #138808;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      margin: 0;
      padding: 0;
      overflow: hidden; 
      background-color: #000;
      user-select: none; 
      touch-action: none;
    }

    .viewport-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(135deg, var(--bg-top), var(--bg-bottom));
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      overflow: hidden;
      padding: 4rem 1.5rem 3rem 1.5rem;
    }

    .mesh-blob {
      position: absolute;
      width: 100vmax;
      height: 100vmax;
      filter: blur(80px);
      opacity: 0.45;
      border-radius: 50%;
      animation: drift 20s infinite alternate;
      z-index: 1;
    }

    @keyframes drift {
      0% { transform: translate(-15%, -15%) scale(1); }
      100% { transform: translate(15%, 15%) scale(1.2); }
    }

    .full-screen-glass {
      position: absolute;
      inset: 0;
      z-index: 10;
      background: var(--glass-bg);
      backdrop-filter: blur(40px) saturate(160%);
      -webkit-backdrop-filter: blur(40px) saturate(160%);
      border: 1px solid var(--glass-border);
      pointer-events: none;
    }

    .splat {
      position: absolute;
      pointer-events: none;
      z-index: 5;
      mix-blend-mode: soft-light; 
      filter: blur(6px);
      animation: splat-fade 2.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
    }

    @keyframes splat-fade {
      0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(2.5) rotate(40deg); opacity: 0; }
    }

    .holi-script {
      font-family: 'Kalam', cursive;
      color: #fff;
      filter: drop-shadow(0 0 20px rgba(255,255,255,0.5));
      line-height: 1.1;
      z-index: 20;
      position: relative;
    }

    .tricolor-glow {
      position: absolute;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, var(--tricolor-saffron) 0%, var(--tricolor-white) 50%, var(--tricolor-green) 100%);
      filter: blur(60px);
      opacity: 0.15;
      z-index: 15;
      pointer-events: none;
    }

    .support-footer {
      z-index: 20;
      text-align: center;
      width: 100%;
      max-width: 400px;
    }

    .heading-serif {
      font-family: 'Playfair Display', serif;
      font-style: italic;
    }

    .btn-tricolor-border {
      position: relative;
      background: rgba(255, 255, 255, 1);
      color: #000;
      font-weight: 800;
      letter-spacing: 0.05em;
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      pointer-events: auto;
      border: 2px solid transparent;
      background-clip: padding-box;
    }
    
    .btn-tricolor-border::before {
      content: '';
      position: absolute;
      inset: -2px;
      z-index: -1;
      background: linear-gradient(to right, var(--tricolor-saffron), var(--tricolor-white), var(--tricolor-green));
      border-radius: inherit;
      opacity: 0.7;
    }

    .btn-outline {
      border: 1.5px solid rgba(255, 255, 255, 0.5);
      color: #fff;
      font-weight: 600;
      letter-spacing: 0.05em;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
      pointer-events: auto;
    }

    .water-stream {
      position: absolute;
      background: linear-gradient(to right, rgba(255,255,255,0.8), transparent);
      height: 2px;
      z-index: 100;
      pointer-events: none;
      animation: stream-shot 0.5s ease-out forwards;
    }

    @keyframes stream-shot {
      0% { width: 0; opacity: 1; }
      100% { width: 600px; opacity: 0; }
    }

    @media (max-width: 640px) {
      .holi-script { font-size: 5.5rem; }
      .support-footer h2 { font-size: 1.25rem; }
      .support-footer p { font-size: 0.75rem; }
    }
  </style>
</head>
<body onmousedown="createSplat(event)" ontouchstart="createSplat(event)">

  <div class="viewport-container" id="main-bg">
    <div class="mesh-blob" style="top: -20%; left: -20%; background: #fb7185;"></div>
    <div class="mesh-blob" style="bottom: -20%; right: -20%; background: #34d399; animation-delay: -5s;"></div>
    <div class="mesh-blob" style="top: 20%; right: -10%; background: #facc15; animation-delay: -10s;"></div>

    <div class="full-screen-glass"></div>

    <div class="flex-1 flex flex-col justify-center items-center text-center relative">
      <div class="tricolor-glow"></div>
      <h1 class="holi-script text-8xl md:text-9xl animate-pulse">
        Happy<br>Holi!
      </h1>
      <p class="text-white/80 text-[11px] uppercase tracking-[0.4em] mt-6 font-bold drop-shadow-lg z-20">
        Tap to splash colors
      </p>
    </div>

    <div class="support-footer">
      <div class="mb-8">
        <h2 class="text-white/60 text-lg md:text-xl font-light tracking-[0.2em] uppercase mb-2">
          Support <span class="heading-serif italic font-bold text-white/80">Indian</span> Apps
        </h2>
        <p class="text-white/40 text-xs font-medium max-w-[260px] mx-auto leading-relaxed">
          A fast Chromium browser with adblock, made with ❤️ in India.
        </p>
      </div>

      <div class="flex flex-col gap-3 w-full mb-8">
        <a href="market://details?id=com.anahata.browser_default" 
           id="playstore-link" 
           class="btn-tricolor-border py-3.5 px-8 rounded-full text-center text-[10px] uppercase tracking-widest">
          Rate 5 Stars
        </a>
        
        <button id="pichkari-btn" 
                class="btn-outline py-3.5 px-8 rounded-full text-center text-[10px] uppercase tracking-widest">
          Share Joy
        </button>
      </div>

      <div class="flex flex-col items-center gap-2 opacity-50">
        <div class="flex gap-1.5">
            <div class="w-1.5 h-1.5 rounded-full bg-[#FF9933] shadow-[0_0_8px_#FF9933]"></div>
            <div class="w-1.5 h-1.5 rounded-full bg-white shadow-[0_0_8px_#FFFFFF]"></div>
            <div class="w-1.5 h-1.5 rounded-full bg-[#138808] shadow-[0_0_8px_#138808]"></div>
        </div>
        <div class="text-[8px] tracking-[0.6em] font-bold uppercase text-white/80">
          Atmanirbhar Bharat
        </div>
      </div>
    </div>
  </div>

  <script>
    const container = document.getElementById('main-bg');
    const colors = ['#ffffff', '#fff176', '#f06292', '#4dd0e1', '#81c784', '#ffb74d'];
    const appId = "com.anahata.browser_default";

    function createSplat(e) {
      const x = e.clientX || (e.touches && e.touches[0].clientX);
      const y = e.clientY || (e.touches && e.touches[0].clientY);
      if (!x || !y) return;

      const color = colors[Math.floor(Math.random() * colors.length)];
      
      for (let i = 0; i < 3; i++) {
        setTimeout(() => {
          const s = document.createElement('div');
          s.className = 'splat';
          const size = i === 0 ? 250 : Math.random() * 80 + 50;
          const offsetX = (Math.random() - 0.5) * 60;
          const offsetY = (Math.random() - 0.5) * 60;

          s.style.width = size + 'px';
          s.style.height = size + 'px';
          s.style.backgroundColor = color;
          s.style.left = (x + offsetX) + 'px';
          s.style.top = (y + offsetY) + 'px';
          s.style.borderRadius = `${Math.random()*40+30}% ${Math.random()*40+30}% ${Math.random()*40+30}% ${Math.random()*40+30}%`;
          
          container.appendChild(s);
          setTimeout(() => s.remove(), 2500);
        }, i * 40);
      }
    }

    const shareBtn = document.getElementById('pichkari-btn');
    shareBtn.onclick = (e) => {
      e.stopPropagation();
      const rect = shareBtn.getBoundingClientRect();
      const stream = document.createElement('div');
      stream.className = 'water-stream';
      stream.style.left = rect.right + 'px';
      stream.style.top = (rect.top + rect.height / 2) + 'px';
      document.body.appendChild(stream);
      setTimeout(() => stream.remove(), 500);

      const text = encodeURIComponent("💦 *Happy Holi!* 🔫\n\nYou've been splashed with Digital Gulaal! 🎨\n\nSupport Indian Tech innovation and help make Bharat Atmanirbhar. Join the movement: https://play.google.com/store/apps/details?id=" + appId);
      
      setTimeout(() => {
        window.location.href = `whatsapp://send?text=${text}`;
      }, 400);
    };

    const playStoreLink = document.getElementById('playstore-link');
    playStoreLink.onclick = (e) => {
      e.stopPropagation();
      const start = Date.now();
      setTimeout(() => {
        if (Date.now() - start < 1500 && !document.hidden) {
          window.location.href = "https://play.google.com/store/apps/details?id=" + appId;
        }
      }, 1000);
    };
  </script>
</body>
</html>
